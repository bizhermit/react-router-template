name: template-dev

services:
  app:
    image: node-dev:24-rr
    build:
      context: ../
      dockerfile: .devcontainer/docker/node/Dockerfile
      args:
        HOST_UID: "${HOST_UID:-1000}"
        HOST_GID: "${HOST_GID:-1000}"
    tty: true
    user: "${HOST_UID:-1000}:${HOST_UID:-1000}"
    working_dir: /workspace
    volumes:
      - "../:/workspace"
      - "node_modules:/workspace/node_modules"
      - "react-router:/workspace/.react-router"
      - "artifacts:/workspace/.artifacts"
    environment:
      DEV_PORT: "${DEV_PORT:-5173}"
      # LOCALHOST: "${LOCALHOST:-host.docker.internal}"
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

  postgres:
    restart: "no"
    volumes:
      - "postgres:/var/lib/postgresql"
      - "../database/postgres/init:/docker-entrypoint-initdb.d"
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    command: >
      postgres
      -c "port=${POSTGRES_PORT:-5432}"
      -c "log_destination=stderr"
      -c "log_min_messages=${POSTGRES_LOG_LEVEL:-WARNING}"
      -c "log_connections=on"
      -c "log_disconnections=on"
      -c "log_statement=all"

volumes:
  node_modules:
  react-router:
  artifacts:
  postgres:
